version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: handyhouse_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: handyhouse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d handyhouse"]
      interval: 5s
      timeout: 5s
      retries: 5

  nextjs-app:
    build: .
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@db:5432/handyhouse?schema=public
      - NODE_ENV=production
    restart: always
    deploy:
      replicas: 3
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: handyhouse_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - nextjs-app

volumes:
  pgdata:
