events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream crm_backend {
        server crm-service:5001;
    }

    upstream hr_backend {
        server hr-service:5002;
    }

    server {
        listen 80;
        server_name localhost;

        # Nginx forwards requests to backend; Express handles CORS via app.use(cors())


        client_max_body_size 50M;

        location /api/crm/ {
            proxy_pass http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/hr/ {
            proxy_pass http://hr_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Route anything else to frontend or handle 404
        location / {
            return 404 '{"error": "Not Found", "message": "API Gateway: Route not found"}';
        }
    }
}
