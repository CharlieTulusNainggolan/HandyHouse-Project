version: '3.8'

services:
  # Next.js Application (Frontend)
  nextjs-app:
    build: 
      context: ./HandyHouse
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/erp_crm_db
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_PUBLIC_URL=http://s3.localhost
      - CRM_SERVICE_URL=http://crm-service:5001
      - HR_SERVICE_URL=http://hr-service:5002
    restart: always
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextjs-app.rule=Host(`localhost`) || Host(`handyhouse.localhost`) || Host(`crm.localhost`) || Host(`hr.localhost`)"
      - "traefik.http.routers.nextjs-app.entrypoints=web"
      - "traefik.http.services.nextjs-app.loadbalancer.server.port=3000"

  # API Gateway (Nginx) - Commented out as requested, replaced by Traefik
  # api-gateway:
  #   image: nginx:alpine
  #   container_name: erp_api_gateway
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ./nginx-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - crm-service
  #     - hr-service

  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.0
    container_name: erp_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always

  # CRM Microservice
  crm-service:
    build:
      context: ./crm-service
    container_name: crm_service
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/erp_crm_db
      - PORT=5001
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_PUBLIC_URL=http://s3.localhost
    restart: always
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm-service.rule=PathPrefix(`/api/crm`)"
      - "traefik.http.routers.crm-service.entrypoints=web"
      - "traefik.http.services.crm-service.loadbalancer.server.port=5001"

  # HR Microservice
  hr-service:
    build:
      context: ./hr-service
    container_name: hr_service
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/erp_hr_db
      - PORT=5002
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_PUBLIC_URL=http://s3.localhost
    restart: always
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hr-service.rule=PathPrefix(`/api/hr`)"
      - "traefik.http.routers.hr-service.entrypoints=web"
      - "traefik.http.services.hr-service.loadbalancer.server.port=5002"

  # PostgreSQL Central Database
  postgres:
    image: postgres:15-alpine
    container_name: erp_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
      - POSTGRES_MULTIPLE_DATABASES=erp_crm_db,erp_hr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    restart: always

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: erp_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-adminpassword}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always
    labels:
      - "traefik.enable=true"
      # Console dashboard routing
      - "traefik.http.routers.minio-console.rule=Host(`minio.localhost`)"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.routers.minio-console.service=minio-console-service"
      - "traefik.http.services.minio-console-service.loadbalancer.server.port=9001"
      # API routing (for public file access)
      - "traefik.http.routers.minio-api.rule=Host(`s3.localhost`)"
      - "traefik.http.routers.minio-api.entrypoints=web"
      - "traefik.http.routers.minio-api.service=minio-api-service"
      - "traefik.http.services.minio-api-service.loadbalancer.server.port=9000"

  # MinIO Client to Initialize Buckets
  minio-mc:
    image: minio/mc:latest
    container_name: erp_minio_mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY:-admin} $${MINIO_SECRET_KEY:-adminpassword};
      /usr/bin/mc mb myminio/crm-assets || true;
      /usr/bin/mc anonymous set public myminio/crm-assets;
      /usr/bin/mc mb myminio/hr-assets || true;
      /usr/bin/mc anonymous set public myminio/hr-assets;
      /usr/bin/mc mb myminio/erp-bucket || true;
      /usr/bin/mc anonymous set public myminio/erp-bucket;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
